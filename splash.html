<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Automatic redirect to home page -->
  <meta http-equiv="refresh" content="4; url=home.html" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0077b6;
      --secondary: #00b4d8;
      --accent: #90e0ef;
      --dark: #03045e;
      --light: #caf0f8;
      --white: #ffffff;
      --font-header: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;

    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-header);
      background: var(--dark);
      color: var(--white);
      height: 100vh;
      text-align: center;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 5px;

    }


    /* Main splash content */
    .splash-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      max-width: 640px;
      padding: 2rem;
      animation: slideUp 1s ease-out;
    }

    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.5s ease-out;
    }

    @keyframes slideUp {
      0% {
        transform: translate(-50%, 100%);
      }

      100% {
        transform: translate(-50%, -50%);
      }
    }

    @keyframes slideRight {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .splash-icon {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .splash-title {
      font-family: 'Monoton', sans-serif;
      font-style: normal;
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 0.3rem;
      letter-spacing: 5px;
      text-shadow: 0 0 10px rgba(144, 224, 239, 0.8),
        0 0 20px rgba(0, 180, 216, 0.5);
    }

    body {
      font-family: var(--font-body);

    }

    .splash-sdg {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .splash-mission {
      font-size: 0.8rem;
      color: var(--light);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .team-names {
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 1.8rem;
      letter-spacing: 0.5px;
    }

    /* CSS Loader animation */
    .loader {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .loader span {
      width: 10px;
      height: 10px;
      background: var(--secondary);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.5;
      }

      40% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    /* Countdown */
    #countdown {
      font-size: 1rem;
      color: var(--light);
      margin-bottom: 1.2rem;
    }

    /* Skip button */
    .skip-btn {
      display: inline-block;
      padding: 0.55rem 1.6rem;
      background: var(--secondary);
      color: var(--dark);
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s, transform 0.2s;
    }

    .skip-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }
  </style>
  <title>OceanAct</title>
</head>

<body>

  <!-- Background video with alt text for accessibility -->
  <video autoplay muted loop
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(3px); z-index: -2; opacity: 0.6;">
    <source src="./images/splash.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Main content -->
  <div class="splash-content">
    <div class="splash-icon">🌊</div>
    <h1 class="splash-title">OceanAct</h1>
    <p class="splash-sdg">SDG 14 · Life Below Water</p>
    <p class="splash-mission">
      Protecting our oceans, coasts, and marine life — because a healthy ocean means
      a healthy planet. Take action today for a sustainable blue future.
    </p>
    <p class="team-names">By: Saarujan &nbsp;|&nbsp; Ruchira &nbsp;|&nbsp; Omika</p>

    <!-- CSS Loader (dot bounce animation) -->
    <div class="loader">
      <span></span><span></span><span></span>
    </div>

    <!-- JS countdown -->
    <p id="countdown">Entering site in 4…</p>

    <!-- Skip button -->
    <button class="skip-btn" id="skipBtn" onclick="skipIntro()">Skip Intro →</button>
  </div>

  <script>
    // Countdown timer — updates every second using JavaScript
    let seconds = 4;
    let timer = setInterval(function () {
      seconds--;
      const el = document.getElementById('countdown');
      if (seconds > 0) {
        el.textContent = 'Entering site in ' + seconds + '…';
      } else {
        el.textContent = 'Loading…';
        clearInterval(timer);
        slideToHome();
      }
    }, 1000);

    // Skip Intro — cancels the auto-redirect and navigates immediately
    function skipIntro() {
      clearInterval(timer);
      slideToHome();
    }

    function slideToHome() {
      window.location.href = 'home.html';
    }
  </script>

</body>

</html>
