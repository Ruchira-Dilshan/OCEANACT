  <style>
    /* Sitemap page styles */
    .sitemap-wrap {
      max-width: 900px;
      margin: 0 auto;
      overflow-x: auto;
    }

    /* SVG nodes hover effect */
    .sm-node rect,
    .sm-node circle {
      transition: fill 0.25s, stroke 0.25s;
    }

    .sm-node:hover rect,
    .sm-node:focus rect {
      fill: #00b4d8;
      stroke: #03045e;
    }

    .sm-node:hover circle,
    .sm-node:focus circle {
      fill: #00b4d8;
    }

    .sm-node:focus {
      outline: 2px dashed var(--secondary);
      outline-offset: 3px;
    }

    /* SVG text */
    .sm-node text {
      pointer-events: none;
    }
  </style>
</head>
